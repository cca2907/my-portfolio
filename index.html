<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <header class="bg-dark text-white text-center py-5">
        <h1 id="user-name">Loading...</h1>
        <p id="user-title" class="lead text-secondary"></p>
    </header>

    <div class="container my-5">
        <h2 class="text-center mb-4">My Projects</h2>
        <div id="projects-container" class="row g-4">
            </div>
    </div>

    <script>
        // PALITAN MO ITO NG IYONG GAS WEB APP URL
        const API_URL = "https://script.google.com/macros/s/AKfycbxbcCTCcpsD27eWJm4ZVieyOSeFwRq4IfUY880KOXdaVR_7wM_EHMcawjmF43-D-SC8/exec";

        async function loadData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                // I-update ang Header
                document.getElementById('user-name').innerText = data.settings.name;
                document.getElementById('user-title').innerText = data.settings.title;

                // I-render ang Projects
                const container = document.getElementById('projects-container');
                    // Check natin kung may link; kung wala, huwag magpakita ng button
                data.projects.forEach(proj => {
                    const linkButton = proj.link 
                        ? `<a href="${proj.link}" target="_blank" class="btn btn-primary btn-sm mt-auto w-100">View Project</a>` 
                        : "";
                
                    const card = `
                        <div class="col-md-4 mb-4">
                            <div class="card h-100 shadow-sm border-0" style="transition: 0.3s; cursor: pointer;" onmouseover="this.style.transform='translateY(-10px)'; this.style.shadow='0 10px 20px rgba(0,0,0,0.1)'" onmouseout="this.style.transform='translateY(0)'">
                                <div class="card-body d-flex flex-column p-4">
                                    <h5 class="card-title fw-bold text-dark mb-3">${proj.title}</h5>
                                    <p class="card-text text-muted small flex-grow-1">${proj.description}</p>
                                    <div class="mb-3">
                                        <span class="badge rounded-pill bg-light text-primary border border-primary px-3">${proj.tech}</span>
                                    </div>
                                    ${linkButton}
                                </div>
                            </div>
                        </div>`;
                    container.innerHTML += card;
                });
            } catch (error) {
                console.error("Error loading data:", error);
            }
        }

        loadData();
    </script>
</body>
</html>
