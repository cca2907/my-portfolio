<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { transition: 0.3s; border: none; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
        footer { margin-top: 50px; padding-bottom: 30px; }
    </style>
</head>
<body class="bg-light">

    <header class="bg-dark text-white text-center py-5 shadow-sm">
        <div class="container">
            <h1 id="user-name" class="fw-bold">Loading...</h1>
            <p id="user-title" class="lead text-secondary"></p>
        </div>
    </header>

    <div class="container my-5">
        <h2 class="text-center mb-5 fw-bold">My Projects</h2>
        <div id="projects-container" class="row g-4">
            </div>
    </div>

    <footer class="text-center">
        <hr class="w-25 mx-auto mb-4">
        <p class="text-muted mb-1">Last Sync: <span id="sync-time" class="fw-bold text-primary">Loading...</span></p>
        <p class="text-muted extra-small" style="font-size: 0.75rem;">
            Data served via Google Apps Script Cache Engine
        </p>
    </footer>

    <script>
        // API URL from your Google Apps Script Web App
        const API_URL = "https://script.google.com/macros/s/AKfycbxbcCTCcpsD27eWJm4ZVieyOSeFwRq4IfUY880KOXdaVR_7wM_EHMcawjmF43-D-SC8/exec"; // [cite: 14]

        async function loadData() {
            try {
                const response = await fetch(API_URL); // [cite: 15]
                const data = await response.json(); // [cite: 16]

                // Update Profile Info from 'Settings' tab
                document.getElementById('user-name').innerText = data.settings.name; // [cite: 16]
                document.getElementById('user-title').innerText = data.settings.title; // [cite: 17]

                // Update Last Sync Timestamp
                document.getElementById('sync-time').innerText = data.lastSync; // [cite: 25]

                // Render Projects from 'Projects' tab
                const container = document.getElementById('projects-container');
                container.innerHTML = ""; // Clear the loading state

                data.projects.forEach(proj => {
                    // Logic to show button only if link exists
                    const linkButton = proj.link
                        ? `<a href="${proj.link}" target="_blank" class="btn btn-primary btn-sm mt-auto w-100">View Project</a>`
                        : ""; // [cite: 18, 19]

                    const card = `
                        <div class="col-md-4 mb-2">
                            <div class="card h-100 shadow-sm p-2">
                                <div class="card-body d-flex flex-column p-4">
                                    <h5 class="card-title fw-bold text-dark mb-3">${proj.title}</h5>
                                    <p class="card-text text-muted small flex-grow-1">${proj.description}</p>
                                    <div class="mb-3">
                                        <span class="badge rounded-pill bg-light text-primary border border-primary px-3">
                                            ${proj.tech}
                                        </span>
                                    </div>
                                    ${linkButton}
                                </div>
                            </div>
                        </div>`; // [cite: 20, 21, 22, 23]

                    container.innerHTML += card; // [cite: 25]
                });

            } catch (error) {
                console.error("Error loading data:", error); // [cite: 26]
                document.getElementById('user-name').innerText = "Update Failed";
                document.getElementById('sync-time').innerText = "Error connecting to API";
            }
        }

        // Initialize the data fetch on page load
        loadData();
    </script>
</body>
</html>
